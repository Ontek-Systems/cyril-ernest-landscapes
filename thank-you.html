<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Cyril Ernest Landscapes</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">

    <style type="text/tailwindcss">
        @theme {
            --color-brand-dark: #1A1A1A;
            --color-brand-beige: #F8F9F4;
            --color-brand-text: #111827;
            --color-brand-accent: #df5164;
            --font-heading: 'Cinzel', serif;
            --font-body: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen bg-brand-beige text-brand-text antialiased" data-page="thank-you">

    <div id="header-placeholder"></div>

    <main class="flex-grow flex items-center justify-center py-24 md:py-32">
        <div class="container mx-auto px-6 max-w-4xl text-center">
            
            <div class="bg-white rounded-[2.5rem] p-12 md:p-20 shadow-xl border border-brand-dark/5 reveal reveal-up">
                <div class="w-24 h-24 bg-[#df5164]/10 rounded-full flex items-center justify-center mx-auto mb-8 border-2 border-[#df5164]">
                    <svg class="w-12 h-12 text-[#df5164]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                    </svg>
                </div>
                
                <h1 class="font-heading text-4xl md:text-5xl lg:text-6xl text-brand-dark font-normal mb-6">Thank You!</h1>
                <p class="font-body text-lg md:text-xl text-brand-dark/70 mb-10 max-w-2xl mx-auto leading-relaxed">
                    Your form details have been successfully submitted. We've received your request and Tony will be in touch with you shortly to discuss your project.
                </p>
                
                <a href="index.html" class="group relative inline-flex items-center justify-between gap-4 pl-6 pr-2 py-3 bg-[#df5164] font-body font-bold text-lg rounded-full overflow-hidden transition-transform duration-500 hover:-translate-y-1 shadow-lg border-none">
                    <span class="absolute right-2.5 top-1/2 -translate-y-1/2 w-10 h-10 bg-brand-dark rounded-full transition-transform duration-700 ease-[cubic-bezier(0.19,1,0.22,1)] group-hover:scale-[25] z-0"></span>
                    <span class="relative z-10 text-white transition-colors duration-500">Return to Homepage</span>
                    <span class="relative z-10 w-10 h-10 flex items-center justify-center bg-brand-dark rounded-full">
                        <svg class="w-5 h-5 text-white transition-transform duration-500 ease-in-out group-hover:translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path>
                        </svg>
                    </span>
                </a>
            </div>

        </div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="global.js"></script>

</body>
</html>
